name: Deploy coverage to Pages

on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches:
      - main
      - v*
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to deploy coverage for (e.g., main, v1.0.0)"
        required: false
        default: "main"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-coverage
  cancel-in-progress: false

env:
  CI: true
  NODE_VERSION: 24
  PNPM_VERSION: 10
  PAGES_OUTPUT_DIR: pages-output
  GH_PAGES_DIR: gh-pages-existing

jobs:
  deploy-coverage:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    steps:
      - name: Determine target branch
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BRANCH="${{ github.event.inputs.target_branch }}"
          else
            BRANCH="${{ github.event.workflow_run.head_branch }}"
          fi

          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          case "$BRANCH" in
            main) TARGET_PATH=main ;;
            v*) TARGET_PATH="$BRANCH" ;;
            *) TARGET_PATH="$BRANCH" ;;
          esac

          echo "target_path=$TARGET_PATH" >> $GITHUB_OUTPUT
          echo "Deploying coverage for branch: $BRANCH"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout gh-pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: ${{ env.GH_PAGES_DIR }}
        continue-on-error: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies (workspace)
        run: pnpm install  --recursive

      - name: Ensure webview-app dependencies
        run: pnpm --filter ./webview-app install

      - name: Run tests with coverage (workspace)
        run: pnpm --workspace-concurrency=2 --filter . --filter ./shared --filter ./webview-app --if-present test:coverage

      - name: Merge coverage reports
        run: pnpm run coverage:merge

      - name: Prepare pages content
        env:
          TARGET: ${{ steps.branch.outputs.target_path }}
        run: |
          mkdir -p "$PAGES_OUTPUT_DIR"

          if [ -d "$GH_PAGES_DIR" ]; then
            cp -R "$GH_PAGES_DIR"/. "$PAGES_OUTPUT_DIR"/
          fi

          rm -rf "$PAGES_OUTPUT_DIR/$TARGET"
          mkdir -p "$PAGES_OUTPUT_DIR/$TARGET"
          cp -R coverage/combined/. "$PAGES_OUTPUT_DIR/$TARGET/"

          node ./scripts/generateCoveragePagesIndex.mjs "$PAGES_OUTPUT_DIR"

      - name: Persist gh-pages history
        env:
          TARGET: ${{ steps.branch.outputs.target_path }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ ! -d "$GH_PAGES_DIR/.git" ]; then
            mkdir -p "$GH_PAGES_DIR"
            cd "$GH_PAGES_DIR"
            git init
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
            cd -
          else
            cd "$GH_PAGES_DIR"
            git checkout --orphan gh-pages 2>/dev/null || git checkout gh-pages
            cd -
          fi

          cp -R "$PAGES_OUTPUT_DIR"/. "$GH_PAGES_DIR"/

          cd "$GH_PAGES_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No gh-pages changes to commit"
          else
            git commit -m "Update coverage pages for $TARGET"
            git push -u origin gh-pages --force
          fi
          cd -

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload coverage artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ env.PAGES_OUTPUT_DIR }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
