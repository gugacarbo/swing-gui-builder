name: Deploy coverage to Pages

on:
  workflow_run:
    workflows: ["Test"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-coverage
  cancel-in-progress: true

jobs:
  deploy-coverage:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies (workspace)
        run: pnpm install --frozen-lockfile --prefer-offline --recursive

      - name: Ensure webview-app dependencies
        run: pnpm --filter ./webview-app install --frozen-lockfile --prefer-offline

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Run build
        run: pnpm run compile

      - name: Run tests with coverage (workspace)
        run: pnpm --workspace-concurrency=2 --filter . --filter ./shared --filter ./webview-app --if-present test:coverage

      - name: Merge coverage reports
        run: pnpm run coverage:merge

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload coverage artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: coverage/combined

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
