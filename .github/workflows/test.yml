name: Test

on:
  push:
  pull_request:

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck and tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      COVERAGE_ARTIFACT_NAME: test-coverage-report
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies (workspace)
        run: pnpm install --recursive

      - name: Ensure webview-app dependencies
        run: pnpm --filter ./webview-app install

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Run tests with coverage (workspace)
        run: pnpm --workspace-concurrency=2 --filter . --filter ./shared --filter ./webview-app --if-present test:coverage

      - name: Validate coverage artifacts
        if: success()
        run: |
          test -d coverage/lcov-report
          test -f coverage/coverage-summary.json

      - name: Upload coverage artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.COVERAGE_ARTIFACT_NAME }}
          path: |
            coverage/lcov-report
            coverage/coverage-summary.json
          if-no-files-found: error

