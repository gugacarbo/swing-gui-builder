name: Test

on:
  push:
  pull_request:

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck and tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies (workspace)
        run: pnpm install --frozen-lockfile --prefer-offline --recursive

      - name: Ensure webview-app dependencies
        run: pnpm --filter ./webview-app install --frozen-lockfile --prefer-offline

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Run tests with coverage (workspace)
        run: pnpm --workspace-concurrency=2 --filter . --filter ./shared --filter ./webview-app --if-present test:coverage

      - name: Merge coverage reports
        run: pnpm run coverage:merge

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: error
          retention-days: 7
          path: coverage/combined
